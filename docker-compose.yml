# docker-compose.yml — Local development environment
# Usage: docker compose up -d
# Includes Ollama sidecar for local LLM testing

services:
  llm-engine:
    build:
      context: .
      target: production
    container_name: llm-engine
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - LLM_PROVIDER=ollama
      - LLM_MODEL=llama3
      - LLM_OLLAMA_BASE_URL=http://ollama:11434
      - LOG_LEVEL=info
    ports:
      - "3100:3100"
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - llm-net

  ollama:
    image: ollama/ollama:latest
    container_name: llm-ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - llm-net

volumes:
  ollama-data:
    driver: local

networks:
  llm-net:
    driver: bridge