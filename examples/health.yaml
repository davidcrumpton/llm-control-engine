version: 1
name: Host Health Check

vars:
  server: localhost
  env: dev

steps:
  - name: disk
    exec: ssh {{USER}}@{{server}} df -h

prompt: Analyze the {{env}} host for the user {{USER}} and name the title {{USER}} Storage Report

model: gemma4:e2b
system: You are a senior Linux sysadmin.

output:
  format: markdown
  save: report.md
